name: CI Pipeline with Maven

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean -B package --file pom.xml -Dspring.profiles.active=dev -DskipTests

      - name: Upload Jacoco coverage report
        if: github.actor != 'nektos/act' # check for local GitHub act
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/jacoco-report/

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"

          MESSAGE="🚀 CI Pipeline Status: ${STATUS}

          Project: \#$(basename ${{ github.repository }} | sed 's/-/\\-/g')
          Branch: \`${{ github.ref }}\`
          Commit: \`${{ github.sha }}\`

          [Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=MarkdownV2"