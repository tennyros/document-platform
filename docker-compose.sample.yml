services:

  document-management-service:
    image: document-management-service:0.0.1
    container_name: document-management-service
    restart: no
    build:
      context: .
      dockerfile: document-management-service/Dockerfile
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USERNAME: ${DB_USERNAME}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}

      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: ${MONGO_PORT}
      MONGO_DB: ${MONGO_DB}

      MINIO_URL: ${MINIO_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8090:8080"
    networks:
      - app-net
      - log-net
    depends_on:
      document-management-service-db:
        condition: service_healthy

  document-signing-service:
    image: document-signing-service:0.0.1
    container_name: document-signing-service
    restart: no
    build:
      context: .
      dockerfile: document-signing-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8091:8081"
    networks:
      - app-net
      - log-net
    depends_on:
      - document-management-service

  document-management-service-db:
    image: postgres:14-alpine
    container_name: document-management-service-db
    restart: on-failure
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5436:${DB_PORT}"
    networks:
      - app-net
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: [
      "postgres",
      "-c", "listen_addresses=*",
      "-c", "shared_preload_libraries=pg_stat_statements",
      "-c", "pg_stat_statements.max=10000",
      "-c", "pg_stat_statements.track=all",
      "-c", "pg_stat_statements.track_utility=on",
      "-c", "log_min_duration_statement=500"
    ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:6-jammy
    container_name: document-management-service-mongo
    ports:
      - "${MONGO_PORT}:${MONGO_PORT}"
    networks:
      - app-net
    volumes:
      - mongodata:/data/db

  minio:
    image: minio/minio:latest
    platform: linux/amd64
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - app-net
    volumes:
      - ./minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - log-net

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - log-net

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.10
    container_name: logstash
    volumes:
      - ./docker/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "50000:50000"
    depends_on:
      - elasticsearch
    networks:
      - log-net

networks:
  app-net:
  log-net:

volumes:
  pgdata:
  mongodata: