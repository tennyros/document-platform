spring:
  application:
    name: document-management-service
  servlet:
    multipart:
      max-file-size: 5MB
      enabled: true
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.xml


logging:
  level:
    root: info

app:
  name: document-management-service